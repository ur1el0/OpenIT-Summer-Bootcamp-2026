<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div>
                <h1>Enrollment System</h1>
                <p>Open iT University - AY 2025-2026</p>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="stats">
            <div class="stat-card">
                <p class="count" id="totalStudentsCount">-</p>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <p class="count" id="enrolledCount">-</p>
                <div class="stat-label">Enrolled</div>
            </div>
            <div class="stat-card">
                <p class="count" id="programsCount">-</p>
                <div class="stat-label">Programs</div>
            </div>
            <div class="stat-card">
                <p class="count" id="avgGradeCount">-</p>
                <div class="stat-label">Avg Grade</div>
            </div>
        </div>

        <div class="filters-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>
            <div class="filter-dropdowns">
                <select id="programFilter">
                    <option value="">All Programs</option>
                </select>
                <select id="yearFilter">
                    <option value="">All Years</option>
                    <option value="1">Year 1</option>
                    <option value="2">Year 2</option>
                    <option value="3">Year 3</option>
                    <option value="4">Year 4</option>
                </select>
            </div>
        </div>

        <div class="table-section">
            <table class="students-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Year</th>
                        <th>Gender</th>
                        <th>Program</th>
                        <th>Section</th>
                        <th>Avg Grade</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Open iT University - Built on Open iT Summer Bootcamp</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
